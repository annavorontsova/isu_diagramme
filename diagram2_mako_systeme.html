<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaKo – Systeme, Rollen und Nachrichten</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#F7F6F2; --surface:#FFFFFF; --border:#E2E0D8; --text:#1A1916; --text-2:#5A5750; --text-3:#9A9890; }
  body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); padding:24px; }
  h1 { font-size:22px; font-weight:600; margin-bottom:4px; color:#1F3864; }
  .subtitle { font-size:13px; color:var(--text-2); margin-bottom:20px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
  svg { width:100%; max-width:680px; display:block; margin:0 auto; }
  .proc-bar { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .proc-btn { cursor:pointer; padding:6px 13px; border-radius:6px; border:1.5px solid var(--border); background:var(--surface); font-size:12px; font-family:'IBM Plex Sans',sans-serif; color:var(--text); transition:all .15s; }
  .proc-btn:hover { border-color:#444; }
  #detail { padding:14px 16px; border-radius:8px; margin-top:12px; font-size:13px; line-height:1.8; background:#F1EFE8; border:1px solid var(--border); min-height:110px; }
  .step-row { display:flex; align-items:baseline; gap:8px; margin:4px 0; flex-wrap:wrap; }
  .step-num { font-weight:600; min-width:20px; font-size:12px; }
  .step-from { font-weight:500; font-size:12px; min-width:170px; }
  .step-msg { display:inline-block; padding:2px 9px; border-radius:4px; font-size:11px; font-weight:500; }
  .step-desc { font-size:11px; color:var(--text-2); }
  code { font-family:'IBM Plex Mono',monospace; font-size:10px; background:#E2E0D8; padding:1px 4px; border-radius:3px; }
  .footer { font-size:11px; color:var(--text-3); text-align:center; margin-top:24px; }
</style>
</head>
<body>
<h1>Marktkommunikation – Systeme, Rollen und Nachrichten</h1>
<p class="subtitle">Interaktiver Überblick – SAP IS-U / ONE! Neueinführung</p>
<div class="card">
<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<!-- SAP IS-U / NB -->
<rect x="240" y="20" width="200" height="70" rx="10" fill="#DEEAF1" stroke="#1F3864" stroke-width="1.5"/>
<text font-family="IBM Plex Sans,sans-serif" font-weight="600" font-size="13" x="340" y="48" text-anchor="middle" fill="#042C53">SAP IS-U</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="11" x="340" y="65" text-anchor="middle" fill="#1F3864">Netzbetreiber (NB)</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="10" x="340" y="80" text-anchor="middle" fill="#2E75B6">WPC · SOAP OUT · MCF OData</text>
<!-- Middleware -->
<rect x="255" y="158" width="170" height="54" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text font-family="IBM Plex Sans,sans-serif" font-weight="600" font-size="12" x="340" y="180" text-anchor="middle" fill="#444441">Middleware</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="10" x="340" y="196" text-anchor="middle" fill="#5A5750">PI/PO · MuleSoft</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="10" x="340" y="207" text-anchor="middle" fill="#5A5750">RFC/SOAP → EDIFACT</text>
<!-- Lieferant -->
<rect x="30" y="290" width="190" height="64" rx="10" fill="#E2EFDA" stroke="#375623" stroke-width="1"/>
<text font-family="IBM Plex Sans,sans-serif" font-weight="600" font-size="12" x="125" y="312" text-anchor="middle" fill="#1A3A08">Lieferant (LF)</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="10" x="125" y="328" text-anchor="middle" fill="#375623">SAP IS-U / kVASy / Schleupen</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="10" x="125" y="343" text-anchor="middle" fill="#375623">Fremdsystem</text>
<!-- EDI-Gateway -->
<rect x="250" y="290" width="180" height="64" rx="10" fill="#FFF2CC" stroke="#C55A11" stroke-width="1"/>
<text font-family="IBM Plex Sans,sans-serif" font-weight="600" font-size="12" x="340" y="312" text-anchor="middle" fill="#4A1B00">EDI-Gateway</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="10" x="340" y="328" text-anchor="middle" fill="#C55A11">AS2 · SFTP · BDEW-Standard</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="10" x="340" y="343" text-anchor="middle" fill="#C55A11">EDIFACT-Transport</text>
<!-- MSB/GWA -->
<rect x="460" y="290" width="190" height="64" rx="10" fill="#EAD1F5" stroke="#534AB7" stroke-width="1"/>
<text font-family="IBM Plex Sans,sans-serif" font-weight="600" font-size="12" x="555" y="312" text-anchor="middle" fill="#26215C">MSB / GWA-System</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="10" x="555" y="328" text-anchor="middle" fill="#534AB7">PPC · Discovergy</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="10" x="555" y="343" text-anchor="middle" fill="#534AB7">WS6 Messkonzept</text>
<!-- Marktpartnerportal -->
<rect x="40" y="20" width="160" height="64" rx="10" fill="#FCE4D6" stroke="#C55A11" stroke-width="1"/>
<text font-family="IBM Plex Sans,sans-serif" font-weight="600" font-size="12" x="120" y="44" text-anchor="middle" fill="#4A1B00">Marktpartner-</text>
<text font-family="IBM Plex Sans,sans-serif" font-weight="600" font-size="12" x="120" y="60" text-anchor="middle" fill="#4A1B00">portal</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="10" x="120" y="76" text-anchor="middle" fill="#C55A11">Web-Frontend</text>
<!-- Arrows -->
<path d="M200 52 L238 52" stroke="#C55A11" stroke-width="1.2" marker-end="url(#ar2)" fill="none"/>
<text font-family="IBM Plex Sans,sans-serif" font-size="9" x="219" y="44" text-anchor="middle" fill="#C55A11">RFC</text>
<path d="M320 90 L320 156" stroke="#5A5750" stroke-width="1" marker-end="url(#ar2)" fill="none"/>
<path d="M358 156 L358 90" stroke="#5A5750" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar2)" fill="none"/>
<text font-family="IBM Plex Sans,sans-serif" font-size="9" x="370" y="124" fill="#5A5750">SOAP OUT</text>
<text font-family="IBM Plex Sans,sans-serif" font-size="9" x="305" y="124" text-anchor="end" fill="#5A5750">EDIFACT IN</text>
<path d="M340 212 L340 288" stroke="#C55A11" stroke-width="1" marker-end="url(#ar2)" fill="none"/>
<path d="M352 288 L352 212" stroke="#C55A11" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar2)" fill="none"/>
<path d="M268 212 L180 288" stroke="#375623" stroke-width="1" marker-end="url(#ar2)" fill="none"/>
<text font-family="IBM Plex Sans,sans-serif" font-size="9" x="194" y="246" fill="#375623">UTILMD D11A</text>
<path d="M160 288 L278 214" stroke="#375623" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar2)" fill="none"/>
<path d="M412 212 L490 288" stroke="#534AB7" stroke-width="1" marker-end="url(#ar2)" fill="none"/>
<text font-family="IBM Plex Sans,sans-serif" font-size="9" x="478" y="246" fill="#534AB7">UTILMD D11A</text>
<path d="M514 288 L424 214" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar2)" fill="none"/>
<text font-family="IBM Plex Sans,sans-serif" font-size="9" x="495" y="263" fill="#534AB7">IFTSTA D99B</text>
</svg>
</div>

<div class="proc-bar">
  <button class="proc-btn" onclick="show('lw')" id="pb-lw">Lieferantenwechsel</button>
  <button class="proc-btn" onclick="show('neu')" id="pb-neu">Neuanlage (PK3)</button>
  <button class="proc-btn" onclick="show('ein')" id="pb-ein">Einzug / Auszug</button>
  <button class="proc-btn" onclick="show('sperr')" id="pb-sperr">Sperren</button>
  <button class="proc-btn" onclick="show('sda')" id="pb-sda">Stammdatenänderung</button>
</div>
<div id="detail">Prozess auswählen um den Nachrichtenfluss zu sehen.</div>

<p class="footer">SAP IS-U API Fragenkatalog · ONE! Neueinführung · Stand Mai 2026</p>

<script>
const p = {
  lw:{title:"Lieferantenwechsel (PK9 – GPKE)",color:"#1D9E75",steps:[
    {from:"LF-System",to:"EDI-Gateway",msg:"UTILMD D11A",desc:"Anmeldung neuer Lieferant"},
    {from:"EDI-Gateway",to:"Middleware",msg:"EDIFACT → intern",desc:"Konvertierung"},
    {from:"Middleware",to:"SAP IS-U",msg:"ISU_EDS_MSG_RECEIVE",desc:"RFC – Nachricht einbuchen"},
    {from:"SAP IS-U",to:"SAP IS-U",msg:"WPC_PROCESS_START",desc:"Interner RFC – LW-Prozess starten"},
    {from:"SAP IS-U",to:"Middleware",msg:"ISU_EDS_MSG_SEND",desc:"Bestätigung aufbauen"},
    {from:"Middleware",to:"EDI-Gateway",msg:"EDIFACT",desc:"Konvertierung → extern"},
    {from:"EDI-Gateway",to:"LF-System",msg:"UTILMD D11A",desc:"Bestätigung LW"},
    {from:"EDI-Gateway",to:"MSB / GWA-System",msg:"UTILMD D11A",desc:"Info MSB-Wechsel"},
    {from:"MSB / GWA-System",to:"SAP IS-U",msg:"IFTSTA D99B",desc:"Bestätigung Zählereinbau"},
  ]},
  neu:{title:"Neuanlage / Konstruktaufbau (PK3)",color:"#185FA5",steps:[
    {from:"Marktpartnerportal",to:"SAP IS-U",msg:"WPC_PROCESS_START (RFC)",desc:"Startet Prozess intern – kein OData"},
    {from:"SAP IS-U",to:"SAP IS-U",msg:"/UsagePoints GET (MCF)",desc:"MaLo-Stammdaten lesen"},
    {from:"SAP IS-U",to:"Middleware",msg:"ISU_EDS_MSG_SEND",desc:"UTILMD aufbauen"},
    {from:"Middleware",to:"EDI-Gateway",msg:"EDIFACT",desc:"Konvertierung"},
    {from:"EDI-Gateway",to:"LF-System",msg:"UTILMD D11A",desc:"Mitteilung neue MaLo"},
    {from:"EDI-Gateway",to:"MSB / GWA-System",msg:"UTILMD D11A",desc:"Anforderung Einbau"},
    {from:"MSB / GWA-System",to:"SAP IS-U",msg:"SOAP IN (IFTSTA)",desc:"Bestätigung Geräteinbau"},
  ]},
  ein:{title:"Einzug / Auszug (PK8 – GPKE)",color:"#0F6E56",steps:[
    {from:"Marktpartnerportal",to:"SAP IS-U",msg:"/MoveIns · /MoveOuts (MCF)",desc:"OData API – kein WPC"},
    {from:"SAP IS-U",to:"Middleware",msg:"SOAP OUT",desc:"UtilitiesContractRegistrationERPNotification_Out"},
    {from:"Middleware",to:"EDI-Gateway",msg:"EDIFACT",desc:"Konvertierung"},
    {from:"EDI-Gateway",to:"LF-System",msg:"UTILMD D11A",desc:"Bestätigung Ein-/Auszug"},
    {from:"LF-System",to:"SAP IS-U",msg:"UTILMD D11A",desc:"Rückmeldung Lieferant"},
  ]},
  sperr:{title:"Sperren / Entsperren (PK15)",color:"#712B13",steps:[
    {from:"SAP IS-U",to:"Middleware",msg:"SOAP OUT",desc:"UtilitiesContractBillingBlockChangeRequest_Out"},
    {from:"Middleware",to:"EDI-Gateway",msg:"EDIFACT",desc:"Konvertierung"},
    {from:"EDI-Gateway",to:"MSB / GWA-System",msg:"UTILMD D11A",desc:"Sperrauftrag an MSB"},
    {from:"EDI-Gateway",to:"LF-System",msg:"UTILMD D11A",desc:"Info Sperrung"},
  ]},
  sda:{title:"Stammdatenänderung SDÄ (PK51/PK53)",color:"#534AB7",steps:[
    {from:"LF-System",to:"EDI-Gateway",msg:"UTILMD D11A",desc:"Adress-/Namensänderung"},
    {from:"EDI-Gateway",to:"Middleware",msg:"EDIFACT → intern",desc:"Konvertierung"},
    {from:"Middleware",to:"SAP IS-U",msg:"ISU_EDS_MSG_RECEIVE",desc:"Stammdaten einbuchen"},
    {from:"SAP IS-U",to:"SAP IS-U",msg:"/UsagePoints PATCH",desc:"MCF OData – aktualisieren"},
    {from:"SAP IS-U",to:"Middleware",msg:"SOAP OUT",desc:"UtilitiesContractRegistrationERPNotification_Out"},
    {from:"Middleware",to:"EDI-Gateway",msg:"EDIFACT",desc:"Konvertierung"},
    {from:"EDI-Gateway",to:"LF-System",msg:"UTILMD D11A",desc:"Bestätigung SDÄ"},
  ]}
};
let cur=null;
function show(key) {
  const d=p[key];
  let html=`<div style="font-weight:600;font-size:14px;color:${d.color};margin-bottom:8px">${d.title}</div>`;
  d.steps.forEach((s,i) => {
    const tag=`background:${d.color}18;color:${d.color};border:1px solid ${d.color}44`;
    html+=`<div class="step-row"><span class="step-num" style="color:${d.color}">${i+1}.</span><span class="step-from">${s.from} → ${s.to}</span><span class="step-msg" style="${tag}">${s.msg}</span><span class="step-desc">${s.desc}</span></div>`;
  });
  document.getElementById('detail').innerHTML=html;
  document.querySelectorAll('.proc-btn').forEach(b=>{b.style.borderColor='var(--border)';b.style.background='var(--surface)';b.style.color='var(--text)';});
  const btn=document.getElementById('pb-'+key);
  if(btn){btn.style.borderColor=d.color;btn.style.background=d.color+'18';btn.style.color=d.color;}
}
show('lw');
</script>
</body>
</html>
