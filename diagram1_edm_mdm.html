<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>EDM vs MDM – Unterschied und Zusammenspiel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --border: #E2E0D8;
    --text: #1A1916; --text-2: #5A5750; --text-3: #9A9890;
    --blue: #1F3864; --blue-l: #D6E4F0; --blue-m: #BFD5E9;
    --green: #375623; --green-l: #E2EFDA; --green-m: #C6DEB8;
    --amber: #C55A11; --amber-l: #FFF2CC;
    --purple: #534AB7; --purple-l: #EAD1F5;
    --gray: #888780; --gray-l: #F1EFE8;
  }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; color: var(--blue); }
  .subtitle { font-size: 13px; color: var(--text-2); margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  svg { width: 100%; max-width: 680px; display: block; margin: 0 auto; }
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .tab-btn { cursor: pointer; padding: 6px 14px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--surface); font-size: 13px; font-family: 'IBM Plex Sans', sans-serif; color: var(--text); transition: all .15s; }
  .tab-btn:hover { border-color: var(--blue); color: var(--blue); }
  .tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  #explain { padding: 16px; border-radius: 8px; margin-top: 12px; font-size: 13px; line-height: 1.8; background: var(--gray-l); border: 1px solid var(--border); min-height: 100px; }
  #explain table { border-collapse: collapse; width: 100%; margin-top: 8px; }
  #explain td, #explain th { padding: 6px 10px; border: 1px solid var(--border); font-size: 12px; }
  #explain th { background: var(--bg); font-weight: 500; }
  code { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: var(--border); padding: 1px 5px; border-radius: 3px; }
  .footer { font-size: 11px; color: var(--text-3); text-align: center; margin-top: 24px; }
</style>
</head>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('beide')">Überblick</button>

  <button class="tab-btn" onclick="showTab('edm')">EDM im Detail</button>

  <button class="tab-btn" onclick="showTab('proj')">Im Projekt</button>
</div>
<div id="explain"></div>

<p class="footer">SAP IS-U API Fragenkatalog · ONE! Neueinführung · Stand Mai 2026</p>

<script>
const tabs = {
  beide: { color:"#1F3864", html:`<b style="color:#1F3864">MDM</b> und <b style="color:#375623">EDM</b> arbeiten zusammen — aber sie machen verschiedene Dinge:<br><br><b>MDM</b> = kümmert sich um den einzelnen Zähler und seine Messwerte → wer hat wann wie viel verbraucht?<br><b>EDM</b> = kümmert sich um die Energiemengen im Netz und deren Bilanzierung → stimmt die Summe aller Lieferungen?<br><br>Vereinfacht: <b>MDM ist auf Zählerebene</b>, <b>EDM ist auf Netzebene</b>.` },
  mdm: { color:"#1F3864", html:`<b style="color:#1F3864;font-size:14px">MDM – Meter Data Management (WS5 in SAP IS-U)</b><br><br>MDM ist <b>in SAP IS-U integriert</b> — kein separates System.<br><br><b>Was es macht:</b><br>• Empfängt Ablesewerte vom GWA-System per <b>SOAP IN</b><br>• Prüft Plausibilität der Messwerte<br>• Bildet Schätz- und Ersatzwerte wenn Werte fehlen<br>• Ordnet SLP-Profile zu (Standardlastprofile für kleine Kunden)<br>• Stellt Ableseaufträge bereit<br><br><b>APIs:</b><br>• <code>ERP_ISU_UMC / MeterReadings</code> (MCF OData)<br>• <code>ZE_API_MDM_MRPF_MR</code> (Custom OData)<br>• <code>MeterReadingDocumentERPResultBulkCreateRequest_In</code> (SOAP IN)` },
  edm: { color:"#375623", html:`<b style="color:#375623;font-size:14px">EDM – Energy Data Management (externes System, z.B. ZFA)</b><br><br>EDM ist <b>meist ein separates System</b> außerhalb SAP.<br><br><b>Was es macht:</b><br>• Verarbeitet <b>Lastgangdaten (RLM)</b> — 15-Minuten-Zeitreihen von großen Kunden<br>• Bilanziert Energiemengen: Einspeisung vs. Entnahme<br>• Berechnet Mehr-/Mindermengen zwischen NB und LF<br>• Plant Prognosen für den nächsten Tag/Monat<br>• Führt Settlement-Abrechnung durch<br><br><b>APIs:</b><br>• <code>UtilitiesTimeSeriesERPItemBulkCreateRequest_In</code> (SOAP IN)<br>• <code>SettlementInformation*BillingRequest_Out</code> (SOAP OUT WS8)<br>• <code>MSCONS D04A</code> — Energiemengen an Lieferant` },
  diff: { color:"#444441", html:`<b style="font-size:14px">Unterschied auf einen Blick</b><br><br><table><tr style="background:#F7F6F2"><th>Merkmal</th><th style="color:#1F3864">MDM</th><th style="color:#375623">EDM</th></tr><tr><td>Ebene</td><td style="color:#1F3864">Einzelner Zähler</td><td style="color:#375623">Gesamtes Netz</td></tr><tr style="background:#F7F6F2"><td>Datentyp</td><td style="color:#1F3864">Zählerstände, SLP</td><td style="color:#375623">Lastgänge 15-min</td></tr><tr><td>Kunden</td><td style="color:#1F3864">Alle (SLP + RLM)</td><td style="color:#375623">Nur Großkunden (RLM)</td></tr><tr style="background:#F7F6F2"><td>System</td><td style="color:#1F3864">In SAP IS-U</td><td style="color:#375623">Separat (ZFA)</td></tr><tr><td>Hauptaufgabe</td><td style="color:#1F3864">Ablesung → Abrechnung</td><td style="color:#375623">Bilanzierung → Settlement</td></tr></table>` },
  proj: { color:"#C55A11", html:`<b style="color:#C55A11;font-size:14px">Im Projekt ONE! (Netze BW / Herrenberg)</b><br><br><b>MDM (WS5):</b> SOAP IN deployed ✔ · OData deployed ✔ · Custom OData deployed ✔<br><br><b>EDM (WS5 + WS8):</b> TimeSeries SOAP IN deployed ✔ · Settlement SOAP OUT deployed ✔<br><br><b>Wichtig:</b> EDM und MDM teilen sich SOAP-Dienste in WS5 — deshalb hat WS5 mit 24 APIs den größten API-Block im Fragenkatalog.` }
};
function showTab(key) {
  const t = tabs[key];
  document.getElementById('explain').innerHTML = `<div style="color:${t.color}">${t.html}</div>`;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
showTab('beide');
</script>
</body>
</html>
